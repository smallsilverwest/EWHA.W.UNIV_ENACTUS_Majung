<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 상세정보</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex justify-center">
    <div class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col">
        <div class="p-5 border-b flex items-center bg-white sticky top-0 z-10">
            <button id="btn-back" class="mr-4 text-2xl">←</button>
            <h1 class="font-bold text-lg">어르신 정보</h1>
        </div>

        <div class="p-6">
            <div class="bg-slate-50 rounded-3xl p-8 border border-slate-100 mb-8 shadow-sm">
                <h2 id="name" class="text-3xl font-black text-gray-800 mb-8 tracking-tight">불러오는 중...</h2>
                <div class="space-y-6">
                    <div><p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">나이 / 성별</p><p id="age-gender" class="text-xl font-bold text-gray-700">-</p></div>
                    <div><p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">거주지 주소</p><p id="address" class="text-lg font-bold text-gray-700">-</p></div>
                    <div><p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">관할 경찰서</p><p id="police" class="text-lg font-bold text-gray-700">-</p></div>
                    <div><p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">등록 센터</p><p id="center" class="text-lg font-bold text-gray-700">-</p></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <a id="call-guardian" href="#" class="bg-red-600 hover:bg-bred-700 text-white text-center py-5 rounded-2xl font-bold shadow-md transition-all">보호자 연락</a>
                <a id="call-center" href="#" class="bg-orange-500 hover:bg-orange-600 text-white text-center py-5 rounded-2xl font-bold shadow-md transition-all">센터 연락</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBphUEAQmK1XXYnNcQYK5NEOFDfxleNaAQ",
            authDomain: "majung-260402v1.firebaseapp.com",
            projectId: "majung-260402v1",
            storageBucket: "majung-260402v1.firebasestorage.app",
            messagingSenderId: "18043440169",
            appId: "1:18043440169:web:f5f131e3fa0426ef126038",
            measurementId: "G-4CHSF7NFGR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const elderId = urlParams.get('id') || "elder01";
        document.getElementById('btn-back').onclick = () => location.href = `index.html?id=${elderId}`;

        async function loadData() {
            const docRef = doc(db, "elders", elderId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('name').innerText = `${data.name}, (${data.gender})`;
                document.getElementById('age-gender').innerText = `${data.age}세`;
                document.getElementById('address').innerText = data.address;
                document.getElementById('police').innerText = data.police_loc; // 필드명 통일
                document.getElementById('center').innerText = data.center_loc; // 필드명 통일
                document.getElementById('call-guardian').href = "tel:" + data.guardian_phone;
                document.getElementById('call-center').href = "tel:" + data.center_phone;
            }
        }
        loadData();
    </script>
</body>
</html>
