<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 상세정보</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-200 flex justify-center text-gray-800 font-sans">
    <div class="w-full max-w-md min-h-screen bg-white shadow-2xl flex flex-col relative overflow-hidden">
        <div class="p-5 border-b flex items-center bg-white sticky top-0 z-10">
            <button id="btn-back" class="mr-4 text-2xl active:scale-90 transition-transform">←</button>
            <h1 class="font-bold text-lg">어르신 정보</h1>
        </div>

        <div class="p-6">
            <div class="bg-slate-50 rounded-3xl p-8 border border-slate-100 mb-8 shadow-sm">
                <h2 id="name" class="text-3xl font-black text-gray-800 mb-8 tracking-tight">불러오는 중...</h2>
                <div class="space-y-6">
                    <div><p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">나이 / 성별</p><p id="age-gender" class="text-xl font-bold text-gray-700">-</p></div>
                    <div><p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">거주지 주소</p><p id="address" class="text-lg font-bold text-gray-700">-</p></div>
                    <div><p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">관할 경찰서</p><p id="police" class="text-lg font-bold text-gray-700">-</p></div>
                    <div><p class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-1">등록 센터</p><p id="center" class="text-lg font-bold text-gray-700">-</p></div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <a id="call-guardian" href="#" class="bg-red-600 hover:bg-bred-700 text-white text-center py-5 rounded-2xl font-bold shadow-md transition-all">보호자 연락</a>
                <a id="call-center" href="#" class="bg-orange-500 hover:bg-orange-600 text-white text-center py-5 rounded-2xl font-bold shadow-md transition-all">센터 연락</a>
            </div>
        </div>
    </div>

    <script type="module">
    // 1. 필요한 Firebase 함수 임포트
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // 2. 최신 Firebase 설정값 적용 (safeloop-majung 프로젝트)
    const firebaseConfig = {
        apiKey: "AIzaSyARCEpqFrnnCg6bbDzC7etXK_Ypnyc_1yY",
        authDomain: "safeloop-majung.firebaseapp.com",
        projectId: "safeloop-majung",
        storageBucket: "safeloop-majung.firebasestorage.app",
        messagingSenderId: "1031230129161",
        appId: "1:1031230129161:web:5d164644d2a9857f5aa4d8",
        measurementId: "G-KPX19HQ2JG"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 3. URL 파라미터에서 ID 추출 (기본값 'demo')
    const urlParams = new URLSearchParams(window.location.search);
    const elderId = urlParams.get('id') || "demo";

    // 뒤로가기 버튼 동작 (ID 유지)
    document.getElementById('btn-back').onclick = () => {
        location.href = `index.html?id=${elderId}`;
    };

    // 4. 데이터 로드 함수
    async function loadData() {
        // 'Users' 컬렉션의 elderId 문서 참조
        const docRef = doc(db, "Users", elderId);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();

            // UI 요소에 데이터 바인딩 (이미지 속 필드명과 일치시킴)
            document.getElementById('name').innerText = `${data.name || '이름 없음'} (${data.gender || '-'})`;
            document.getElementById('age-gender').innerText = `${data.age || '-'}세`;
            document.getElementById('address').innerText = data.address || "등록된 주소 없음";
            
            // 이미지에서 확인된 필드명: police_loc, center_loc
            document.getElementById('police').innerText = data.police_loc || "정보 없음";
            document.getElementById('center').innerText = data.center_loc || "정보 없음";

            // 전화 연결 링크 설정 (DB 필드명: guardian_phone, center_phone)
            const guardianCall = document.getElementById('call-guardian');
            const centerCall = document.getElementById('call-center');

            if (data.guardian_phone) {
                guardianCall.href = "tel:" + data.guardian_phone;
            }
            if (data.center_phone) {
                centerCall.href = "tel:" + data.center_phone;
            }
        } else {
            document.getElementById('name').innerText = "사용자 정보를 찾을 수 없습니다.";
        }
    }

    loadData();
</script>
</body>
</html>
