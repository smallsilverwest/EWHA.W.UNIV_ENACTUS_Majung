<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마중 - 홈</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 flex justify-center text-gray-800 font-sans">
    <div class="w-full max-w-md min-h-screen bg-white shadow-lg flex flex-col relative overflow-hidden">
        
        <div id="missing-banner" class="hidden bg-red-600 text-white text-center py-3 text-[13px] font-bold sticky top-0 z-50">
            ● 현재, 실종 신고가 접수된 어르신입니다. ●
        </div>

        <div class="p-6 flex flex-col items-center">
            <div class="text-center mt-6 mb-8">
                <h1 class="text-2xl font-black text-gray-900 mb-1 tracking-tight">마중안심밴드</h1>
                <p class="text-gray-400 text-xs font-medium">안심밴드를 통해 소중한 가족을 찾습니다.</p>
            </div>

            <div class="w-full mb-8 text-center bg-red-50 border border-red-100 rounded-[2.5rem] p-10 shadow-sm">
                <div class="text-6xl mb-4">🚨</div>
                <h2 class="text-2xl font-black text-gray-900 mb-2 leading-tight tracking-tight">도움이 필요한<br>어르신입니다.</h2>
                <p class="text-gray-500 text-sm font-medium">안전하게 귀가할 수 있도록 도와주세요.</p>
            </div>

            <div class="w-full mt-auto px-1">
                <div class="flex items-center mb-5 text-[13px] text-pink-600 font-bold">
                    <span class="mr-2 text-base">📞</span> 아래 버튼을 누르면 바로 전화가 연결됩니다.
                </div>
                
                <div class="grid grid-cols-3 gap-3 mb-6 font-black text-white">
                    <a id="call-guardian" href="#" class="bg-blue-600 text-center py-5 rounded-3xl shadow-lg flex flex-col items-center active:scale-95 transition-all">
                        <span class="text-[11px] opacity-90 mb-1">보호자</span>
                        <span class="text-xl">연결</span>
                    </a>
                    <a href="tel:182" class="bg-orange-500 text-center py-5 rounded-3xl shadow-lg flex flex-col items-center active:scale-95 transition-all">
                        <span class="text-[11px] opacity-90 mb-1">실종신고</span>
                        <span class="text-2xl italic">182</span>
                    </a>
                    <a href="tel:112" class="bg-red-600 text-center py-5 rounded-3xl shadow-lg flex flex-col items-center active:scale-95 transition-all">
                        <span class="text-[11px] opacity-90 mb-1">경찰연결</span>
                        <span class="text-2xl italic">112</span>
                    </a>
                </div>

                <div class="bg-yellow-50 border border-yellow-100 rounded-3xl p-6 mb-8 shadow-sm text-left">
                    <p class="text-base font-black text-gray-900 mb-2">이렇게 말씀해 주세요!</p>
                    <p class="text-[14px] text-gray-700 leading-relaxed font-medium">
                        "안심밴드를 통해 연락드립니다.<br>
                        <span class="text-blue-600 font-bold">OOO 장소</span>에서 어르신을 발견했습니다."
                    </p>
                </div>

                <button id="btn-info" class="w-full bg-white text-blue-600 py-5 rounded-[1.5rem] font-black text-lg border-[2.5px] border-blue-600 shadow-sm mb-6 active:scale-95 transition-all">
                    어르신 정보 확인하기
                </button>
                
                <button id="btn-admin" class="w-full text-center text-gray-400 py-4 text-xs underline underline-offset-4 mb-4">
                    보호자 관리 모드
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBphUEAQmK1XXYnNcQYK5NEOFDfxleNaAQ",
            authDomain: "majung-260402v1.firebaseapp.com",
            projectId: "majung-260402v1",
            storageBucket: "majung-260402v1.firebasestorage.app",
            messagingSenderId: "18043440169",
            appId: "1:18043440169:web:f5f131e3fa0426ef126038",
            measurementId: "G-4CHSF7NFGR"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 다중 사용자 지원: URL 파라미터에서 ID 추출
        const urlParams = new URLSearchParams(window.location.search);
        const elderId = urlParams.get('id') || "elder01";

        onSnapshot(doc(db, "elders", elderId), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('missing-banner').classList.toggle('hidden', !data.isMissing);
                document.getElementById('call-guardian').href = `tel:${data.guardian_phone}`;
                
                // 페이지 이동 시 ID 유지
                document.getElementById('btn-info').onclick = () => location.href = `info.html?id=${elderId}`;
                document.getElementById('btn-admin').onclick = () => location.href = `admin.html?id=${elderId}`;
            }
        });
    </script>
</body>
</html>
